services:

  db:
    image: postgres:17-alpine
    container_name: prompteer-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-prompteer}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prompteer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Prompteer.Web/Dockerfile
    container_name: prompteer-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD environment variable is required}
      - POSTGRES_DB=${POSTGRES_DB:-prompteer}
    volumes:
      - dataprotection_keys:/app/keys
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  dataprotection_keys:
